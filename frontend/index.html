<!DOCTYPE html>
<html>
<head>
	<meta charset="UTF-8">
	<title>Movie Recommender</title>

<style>

body{
background:#0b0f1a;
color:white;
font-family:Arial, Helvetica, sans-serif;
margin:0;
padding:0;
}

.container{
width:90%;
margin:auto;
text-align:center;
}

h1{
margin-top:40px;
font-size:40px;
}

.search-box{
margin-top:30px;
}

input{
padding:12px;
width:300px;
border-radius:6px;
border:none;
}

button{
padding:12px 20px;
margin-left:10px;
border:none;
background:#e50914;
color:white;
border-radius:6px;
cursor:pointer;
}

.grid{
margin-top:40px;
display:grid;
grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
gap:20px;
}

.card{
background:#141b2d;
border-radius:8px;
overflow:hidden;
transition:transform .2s;
position:relative;
}

.card{
background:#141b2d;
border-radius:8px;
overflow:hidden;
transition:transform .2s;
position:relative;
}

.card img{
width:100%;
height:260px;
object-fit:cover;
}

.card-info{
position:absolute;
bottom:0;
left:0;
right:0;
background:rgba(0,0,0,0.85);
padding:10px;
font-size:12px;
opacity:0;
transition:opacity .3s;
}

.card-title{
padding:10px;
font-size:14px;
}

.card:hover .card-info{
opacity:1;
}

.card:hover img{
transform:scale(1.08);
}

.rating{
color:#ffd700;
font-weight:bold;
margin-bottom:4px;
}
.card img{
transition:transform 0.3s ease;
}

.message{
grid-column: 1 / -1;
text-align:center;
font-size:20px;
color:#ccc;
margin-top:40px;
}


.loader{
border:4px solid #333;
border-top:4px solid #e50914;
border-radius:50%;
width:40px;
height:40px;
animation:spin 1s linear infinite;
margin:auto;
}

@keyframes spin{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}


.suggestions{
position:absolute;
background:#141b2d;
width:300px;
margin:auto;
left:0;
right:0;
border-radius:6px;
max-height:200px;
overflow-y:auto;
z-index:20;
}

.suggestion{
padding:10px;
cursor:pointer;
border-bottom:1px solid #222;
}

.suggestion:hover{
background:#1f2937;
}

.suggestion.active{
background:#374151;
}
</style>
</head>

<body>

<div class="container">

<h1>🎬 Movie Recommendation System</h1>

<div class="search-box">
<input id="movie" placeholder="Enter a movie name">
<button onclick="recommend()">Recommend</button>
</div>
<div id="suggestions" class="suggestions"></div>

<div class="grid" id="results"></div>

</div>

<script>

const searchInput = document.getElementById("movie")
const suggestionBox = document.getElementById("suggestions")
const resultsBox = document.getElementById("results")

let suggestions = []
let currentIndex = -1


async function getMovieData(tmdbId){
    if(!tmdbId) return null

    try{
        const res = await fetch(`http://127.0.0.1:5000/movie/${tmdbId}`)
        return await res.json()
    }catch(err){
        return null
    }
}


async function recommend(){

    let movie = searchInput.value.trim()

    suggestionBox.innerHTML = ""
    currentIndex = -1

    if(movie === ""){
        resultsBox.innerHTML='<div class="message">Enter a movie name</div>'
        return
    }

    resultsBox.innerHTML='<div class="message"><div class="loader"></div><br>Loading...</div>'

    let response = await fetch("http://127.0.0.1:5000/recommend",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({movie:movie})
    })

    let data = await response.json()

    if(data.error){
        resultsBox.innerHTML=`<div class="message">${data.error}</div>`
        return
    }

    let movies = data

    resultsBox.innerHTML=""

    // fetch all movie metadata in parallel
    const movieDataList = await Promise.all(
        movies.map(m => getMovieData(m.tmdbId))
    )

    movies.forEach((movieObj, i) => {

        const movieData = movieDataList[i]

        let poster = "https://via.placeholder.com/200x300?text=No+Poster"

        if(movieData && movieData.poster_path){
            poster = "https://image.tmdb.org/t/p/w500" + movieData.poster_path
        }

        let overview = movieData?.overview || "No description available."
        let rating = movieData?.vote_average || "N/A"
        let year = movieData?.release_date ? movieData.release_date.slice(0,4) : ""

        let card = document.createElement("div")
        card.className = "card"

        card.innerHTML = `
        <img src="${poster}">
        <div class="card-title">${movieObj.title}</div>

        <div class="card-info">
        <div class="rating">⭐ ${rating}</div>
        <div>${year}</div>
        <p>${overview.substring(0,120)}...</p>
        </div>
        `

        resultsBox.appendChild(card)
    })
}


searchInput.addEventListener("input", async function(){

    let query = this.value.trim()

    if(query.length < 1){
        suggestionBox.innerHTML = ""
        suggestions = []
        return
    }

    let res = await fetch(`http://127.0.0.1:5000/search?q=${encodeURIComponent(query)}`)
    suggestions = await res.json()

    suggestionBox.innerHTML = ""
    currentIndex = -1

    suggestions.forEach((title, index) => {

        let item = document.createElement("div")
        item.className = "suggestion"
        item.innerText = title

        item.onclick = () => selectSuggestion(index)

        suggestionBox.appendChild(item)

    })
})


document.addEventListener("keydown", function(e){

    if(suggestions.length === 0) return

    if(e.key === "ArrowDown"){
        e.preventDefault()
        currentIndex++
        if(currentIndex >= suggestions.length) currentIndex = 0
        updateHighlight()
    }

    else if(e.key === "ArrowUp"){
        e.preventDefault()
        currentIndex--
        if(currentIndex < 0) currentIndex = suggestions.length - 1
        updateHighlight()
    }

    else if(e.key === "Enter"){
        if(currentIndex >= 0){
            selectSuggestion(currentIndex)
        }else{
            recommend()
        }
    }
})


function updateHighlight(){

    let items = document.querySelectorAll(".suggestion")

    items.forEach(item => item.classList.remove("active"))

    if(items[currentIndex]){
        items[currentIndex].classList.add("active")
    }
}


function selectSuggestion(index){

    searchInput.value = suggestions[index]

    suggestionBox.innerHTML = ""
    currentIndex = -1

    recommend()
}


window.onload = () => searchInput.focus()


document.addEventListener("keydown", function(event){

    if(document.activeElement === searchInput) return

    if(event.key.length === 1){
        searchInput.focus()
        searchInput.value += event.key
        event.preventDefault()
    }
})

</script>
</body>
</html>
